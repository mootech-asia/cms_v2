name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # The site is the repository root, so gh-pages mirrors main exactly.
      # Creating the gh-pages branch auto-enables GitHub Pages for the repo.
      - name: Publish main to gh-pages
        run: git push --force origin HEAD:gh-pages
