name: Build Pages candidate

on:
  push:
    branches:
      - main
    paths:
      - 'factory/**'
      - 'frontend/**'
      - 'scripts/verify-factory-win100.js'
      - 'scripts/cache-bust-candidate.js'
      - '.github/workflows/build-pages-candidate.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-candidate
  cancel-in-progress: true

jobs:
  build-candidate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4

      - name: Verify factory static site
        run: node scripts/verify-factory-win100.js

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.18.0
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Generate design studio (Nuxt)
        working-directory: frontend
        env:
          NUXT_APP_BASE_URL: /cms_system_v2/
        run: npm run generate

      - name: Assemble candidate output
        run: |
          set -euo pipefail
          rm -rf .candidate
          mkdir -p .candidate

          # Static front-end (factory/win100/) is the primary site content.
          cp -R factory/win100/. .candidate/
          # WIP static design-studio/admin live under factory/win100/ for future
          # work but are not production-ready (skin-only) — drop them from the
          # candidate so they neither collide with the Nuxt /studio copied below
          # nor ship /admin before it's finished.
          rm -rf .candidate/studio .candidate/admin
          test -f .candidate/index.html
          if grep -Eq '(src|href)="/_nuxt/' .candidate/index.html; then
            echo 'Found root-relative Nuxt asset path in the static front-end; refusing candidate.'
            exit 1
          fi

          # Cache-bust the static front-end's asset refs so GitHub Pages / CDNs /
          # mobile browsers don't keep serving stale site.js/global.css after a
          # deploy. Source keeps bare refs (hand-written, opens locally); only this
          # candidate copy gets ?v=<content-hash>. Runs before the 404.html copy
          # below so 404 inherits the stamped refs, and before the Nuxt studio copy
          # so it only touches factory pages (studio is already content-hashed).
          node scripts/cache-bust-candidate.js .candidate

          # Design studio (/studio) is bound to the factory and deploys alongside
          # the static front-end — only the client admin (/admin) is archived to
          # branch 客戶後台 instead of shipping here. Nuxt's studio pages depend
          # on the shared _nuxt/ chunk bundle, so that comes along too; it doesn't
          # collide with anything since the static pages reference no /_nuxt paths
          # (checked above) and logo.png is byte-identical between both builds.
          mkdir -p .candidate/_nuxt
          cp -R frontend/.output/public/_nuxt/. .candidate/_nuxt/
          cp -R frontend/.output/public/studio .candidate/studio
          test -f .candidate/studio/index.html
          test -f .candidate/studio/preview/index.html

          touch .candidate/.nojekyll
          cp .candidate/index.html .candidate/404.html

      - name: Publish candidate branch
        working-directory: .candidate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git init
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m "Pages candidate from ${GITHUB_SHA}"
          git push --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:pages-candidate
