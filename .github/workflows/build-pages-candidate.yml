name: Build Pages candidate

on:
  push:
    branches:
      - main
    paths:
      - 'factory/**'
      - 'scripts/verify-factory-win100.js'
      - '.github/workflows/build-pages-candidate.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-candidate
  cancel-in-progress: true

jobs:
  build-candidate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4

      - name: Verify factory static site
        run: node scripts/verify-factory-win100.js

      - name: Assemble candidate output
        run: |
          set -euo pipefail
          rm -rf .candidate
          mkdir -p .candidate
          cp -R factory/win100/. .candidate/
          test -f .candidate/index.html
          if grep -Eq '(src|href)="/_nuxt/' .candidate/index.html; then
            echo 'Found root-relative Nuxt asset path; refusing candidate.'
            exit 1
          fi
          touch .candidate/.nojekyll
          cp .candidate/index.html .candidate/404.html

      - name: Publish candidate branch
        working-directory: .candidate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git init
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m "Pages candidate from ${GITHUB_SHA}"
          git push --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:pages-candidate
